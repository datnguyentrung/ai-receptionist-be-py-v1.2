services:
  - type: web
    name: ai-receptionist-backend
    env: docker
    plan: starter
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        sync: false
      - key: JWT_BASE64_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SERVER_PUBLIC_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
